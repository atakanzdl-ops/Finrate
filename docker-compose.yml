version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finrate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finrate_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finrate123}
      POSTGRES_DB: finrate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finrate_user -d finrate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: finrate_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finrate_user:${POSTGRES_PASSWORD:-finrate123}@postgres:5432/finrate_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: finrate_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  postgres_data:
